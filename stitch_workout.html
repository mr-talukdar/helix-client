<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HeliX Workout - Bench Press</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007bff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
<div class="flex items-center gap-4">
<button class="text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div>
<h1 class="text-xl font-bold leading-tight tracking-tight">Bench Press</h1>
<p class="text-sm text-slate-500 dark:text-slate-400">Last session: 80 kg x 6</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">timer</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</div>
</header>
<main class="max-w-2xl mx-auto p-4 pb-48">
<!-- Set List -->
<div class="flex flex-col gap-3">
<!-- Completed Set -->
<div class="flex items-center h-[72px] bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl px-4 justify-between">
<div class="flex items-center gap-4">
<div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/10 text-primary font-bold">
                        1
                    </div>
<div>
<div class="text-lg font-semibold">80 <span class="text-xs font-normal text-slate-500">kg</span></div>
<div class="text-sm text-slate-500">6 Reps</div>
</div>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-green-500 text-3xl">check_circle</span>
</div>
</div>
<!-- Completed Set -->
<div class="flex items-center h-[72px] bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl px-4 justify-between">
<div class="flex items-center gap-4">
<div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary/10 text-primary font-bold">
                        2
                    </div>
<div>
<div class="text-lg font-semibold">80 <span class="text-xs font-normal text-slate-500">kg</span></div>
<div class="text-sm text-slate-500">6 Reps</div>
</div>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-green-500 text-3xl">check_circle</span>
</div>
</div>
<!-- Current Active Set (Pending) -->
<div class="flex items-center h-[72px] bg-white dark:bg-slate-900 border-2 border-primary/50 rounded-xl px-4 justify-between shadow-lg shadow-primary/5">
<div class="flex items-center gap-4">
<div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary text-white font-bold">
                        3
                    </div>
<div>
<div class="text-lg font-semibold">82.5 <span class="text-xs font-normal text-slate-500">kg</span></div>
<div class="text-sm text-slate-500">Target: 6 Reps</div>
</div>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-slate-300 dark:text-slate-700 text-3xl">radio_button_unchecked</span>
</div>
</div>
<!-- Upcoming Set -->
<div class="flex items-center h-[72px] bg-slate-50 dark:bg-slate-900/20 border border-dashed border-slate-200 dark:border-slate-800 rounded-xl px-4 justify-between opacity-60">
<div class="flex items-center gap-4">
<div class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-200 dark:bg-slate-800 text-slate-500 font-bold">
                        4
                    </div>
<div>
<div class="text-lg font-semibold text-slate-400">-- <span class="text-xs font-normal">kg</span></div>
<div class="text-sm text-slate-400">Target: --</div>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Control Panel -->
<footer class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-4 py-6 pb-8 z-20">
<div class="max-w-2xl mx-auto flex flex-col gap-6">
<div class="grid grid-cols-2 gap-4">
<!-- Weight Stepper -->
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 ml-1">Weight (kg)</label>
<div class="flex items-center justify-between bg-slate-100 dark:bg-slate-800 rounded-lg p-1">
<button class="w-10 h-10 flex items-center justify-center rounded-lg bg-white dark:bg-slate-700 shadow-sm text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-xl font-bold">82.5</span>
<button class="w-10 h-10 flex items-center justify-center rounded-lg bg-white dark:bg-slate-700 shadow-sm text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Reps Stepper -->
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 ml-1">Reps</label>
<div class="flex items-center justify-between bg-slate-100 dark:bg-slate-800 rounded-lg p-1">
<button class="w-10 h-10 flex items-center justify-center rounded-lg bg-white dark:bg-slate-700 shadow-sm text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-xl font-bold">6</span>
<button class="w-10 h-10 flex items-center justify-center rounded-lg bg-white dark:bg-slate-700 shadow-sm text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</div>
<!-- Action Button -->
<button class="h-14 w-full bg-primary hover:bg-blue-600 text-white font-bold rounded-xl shadow-lg shadow-primary/25 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check</span>
                Log Set 3
            </button>
</div>
</footer>
</body></html>
